name: Choria Release
on:
  push:
    tags:
      - v[0-9]+\.[0-9]+\.[0-9]+
      - v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+

permissions:
  contents: read

jobs:
  # RedHat
  el_64:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: el_64
          packager_tag: el-go1.26
          version: tag

  el_aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: el_aarch64
          packager_tag: el-go1.26
          version: tag

  el_ppc64le:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: el_ppc64le
          packager_tag: el-go1.26
          version: tag

  # Debian
  debian_64:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: debian_64
          packager_tag: deb-go1.26
          version: tag

  debian_aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: debian_aarch64
          packager_tag: deb-go1.26
          version: tag

  debian_armhf:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: debian_armhf
          packager_tag: deb-go1.26
          version: tag

  debian_armel:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: debian_armel
          packager_tag: deb-go1.26
          version: tag

  # Windows
  windows_64:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: choria-io/actions/packager@64294f0e09350d15dcb974c464c11e169622057a # v0.0.1
        with:
          build_package: windows_64
          packager_tag: deb-go1.26
          version: tag

  upload:
    needs:
      - el_64
      - el_aarch64
      - el_ppc64le
      - debian_64
      - debian_aarch64
      - debian_armhf
      - debian_armel
      - windows_64

    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Artifacts normalization
        shell: bash
        run: |
          cd artifacts
          for i in foss*
          do
            mv -v $i $(echo $i|cut -d_ -f2-)
          done

      - name: Upload artifacts to Spaces
        uses: jakejarvis/s3-sync-action@be0c4ab89158cac4278689ebedd8407dd5f35a83 # v0.5.1
        with:
          args: --endpoint=https://ams3.digitaloceanspaces.com --acl authenticated-read
        env:
          AWS_S3_BUCKET: choria-packages-ams
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          SOURCE_DIR: artifacts
          DEST_DIR: release
